name: 'SOL RPC'

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - "README.md"
env:
  CARGO_TERM_COLOR: always
  SOLANA_CLI_VERSION: "2.1.15"
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 'Check code'
        run: |
          cargo fmt --all -- --check
          cargo clippy --locked --verbose --tests --benches --workspace -- -D clippy::all
          cargo clippy --locked --verbose --target wasm32-unknown-unknown -p sol_rpc_canister -- -D clippy::all

      - name: 'Install cargo-sort'
        run: cargo install cargo-sort@2.0.2

      - name: 'Check Cargo.toml'
        run: cargo sort --workspace --check

  check-cargo-lock:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 'Check root Cargo.lock is up to date'
        run: |
          cargo check --workspace --locked || {
            echo "❌ Root Cargo.lock is out of date"
            echo "Run 'cargo check' in the root directory and commit the updated 'Cargo.lock'"
            exit 1
          }

      - name: 'Check basic_solana example Cargo.lock is up to date'
        working-directory: examples/basic_solana
        run: |
          cargo check --locked || {
            echo "❌ basic_solana example Cargo.lock is out of date"
            echo "Run 'cargo check' in 'examples/basic_solana/' and commit the updated 'Cargo.lock'"
            exit 1
          }

  cargo-doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Cargo doc
        run: |
          cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "--deny warnings"

  reproducible-build:
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 'Docker build'
        run: |
          ./scripts/docker-build

      - name: 'Archive artifact'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sol_rpc_canister.wasm.gz
          path: ./wasms/sol_rpc_canister.wasm.gz
          if-no-files-found: error
          compression-level: 0

      - name: 'Add summary'
        run: |
          hash=`sha256sum ./wasms/sol_rpc_canister.wasm.gz`
          echo "SHA-256 :hash: ${hash}" >> $GITHUB_STEP_SUMMARY

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: 'Run unit tests'
        run: cargo test --locked --workspace --exclude sol_rpc_int_tests --exclude sol_rpc_e2e_tests

  basic-solana-deployment:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 'Install icp-cli'
        run: npm install -g @icp-sdk/icp-cli @icp-sdk/ic-wasm

      # The @dfinity/rust recipe extracts the canister's Candid interface with
      # candid-extractor (the example has no hand-written .did), so it must be on PATH.
      - name: 'Install candid-extractor'
        run: cargo install candid-extractor@0.1.6 --locked

      # On macOS the `zstd` C dependency is compiled for wasm, which Apple's clang cannot target;
      # Homebrew LLVM provides a wasm-capable clang (see AR/CC below).
      - name: 'Install LLVM'
        if: matrix.os == 'macos-latest'
        run: brew install llvm

      - name: "Deploy locally and smoke test"
        working-directory: examples/basic_solana
        env:
          # The workflow sets RUSTFLAGS=-Dwarnings, which makes cargo ignore the rustflags in
          # .cargo/config.toml; re-add the getrandom wasm backend cfg the canister build needs.
          RUSTFLAGS: '-Dwarnings --cfg getrandom_backend="custom"'
        run: |
          # On macOS, point the C compiler at Homebrew LLVM so zstd can be built for wasm.
          if [ "$(uname)" = "Darwin" ]; then
            export AR="$(brew --prefix llvm)/bin/llvm-ar"
            export CC="$(brew --prefix llvm)/bin/clang"
          fi
          # solana_account and get_balance reject the anonymous principal, so use a named identity.
          icp identity new ci --storage plaintext
          icp identity default ci
          icp network start -d
          icp deploy
          out=$(icp canister call backend solana_account '(null)')
          echo "$out"
          echo "$out" | grep -Eq "[1-9A-HJ-NP-Za-km-z]{32,44}" || { echo "❌ Call to 'solana_account' failed"; exit 1; }
          out=$(icp canister call backend get_balance '(null)')
          echo "$out"
          echo "$out" | grep -Eq "[0-9]+(_[0-9]+)*" || { echo "❌ Call to 'get_balance' failed"; exit 1; }
          icp network stop

  check-canister-wasm-endpoints:
    needs: [ reproducible-build ]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 'Download artifacts'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sol_rpc_canister.wasm.gz

      - name: 'Install `ic-wasm`'
        uses: taiki-e/install-action@97a5807a604e12de3a13b52d868ebecaeeea757c # v2.75.4
        with:
          tool: ic-wasm@0.9.10

      - name: 'Check canister endpoints'
        run: |
          ic-wasm "$GITHUB_WORKSPACE/sol_rpc_canister.wasm.gz" check-endpoints --hidden ./canister/hidden_endpoints.conf

  integration-tests:
    needs: [ reproducible-build ]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 'Download artifacts'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sol_rpc_canister.wasm.gz

      - name: 'Set SOL_RPC_CANISTER_WASM_PATH for load_wasm'
        run: |
          echo "SOL_RPC_CANISTER_WASM_PATH=$GITHUB_WORKSPACE/sol_rpc_canister.wasm.gz" >> "$GITHUB_ENV"

      - name: 'Install PocketIC server'
        uses: dfinity/pocketic@20c33db1aa87cc6ece50857ac632c37acf5e0322 # main
        with:
          pocket-ic-server-version: "13.0.0"

      - name: 'Install Solana CLI'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_CLI_VERSION}/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        shell: bash

      - name: 'Start Solana test validator'
        run: |
          solana-test-validator &

      - name: 'Download wallet canister'
        run: |
          wget https://github.com/dfinity/sdk/raw/0a82e042adec6f24ba53665312713923bf276a34/src/distributed/wallet.wasm.gz

      - name: 'Set WALLET_WASM_PATH for load_wasm'
        run: |
          echo "WALLET_WASM_PATH=$GITHUB_WORKSPACE/wallet.wasm.gz" >> "$GITHUB_ENV"

      - name: 'Test sol_rpc_int_tests'
        run: cargo test --locked --package sol_rpc_int_tests -- --test-threads 2 --nocapture

  # The basic_solana example is a separate workspace and uses a newer PocketIC
  # (crate 15, which supports canister environment variables) than the rest of the
  # repository, so it needs its own PocketIC server version and runs as its own job.
  basic-solana-integration-tests:
    needs: [ reproducible-build ]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 'Download artifacts'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sol_rpc_canister.wasm.gz

      - name: 'Set SOL_RPC_CANISTER_WASM_PATH for load_wasm'
        run: |
          echo "SOL_RPC_CANISTER_WASM_PATH=$GITHUB_WORKSPACE/sol_rpc_canister.wasm.gz" >> "$GITHUB_ENV"

      - name: 'Install PocketIC server'
        uses: dfinity/pocketic@20c33db1aa87cc6ece50857ac632c37acf5e0322 # main
        with:
          pocket-ic-server-version: "15.0.0"

      - name: 'Install Solana CLI'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_CLI_VERSION}/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        shell: bash

      - name: 'Start Solana test validator'
        run: |
          solana-test-validator &
          # Wait until the validator's JSON-RPC endpoint is healthy before running the tests,
          # otherwise the first airdrop can race the validator's startup.
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:8899 -X POST -H 'content-type: application/json' \
                 -d '{"jsonrpc":"2.0","id":1,"method":"getHealth"}' | grep -q '"result":"ok"'; then
              echo "Solana test validator is ready"; exit 0
            fi
            echo "Waiting for Solana test validator... ($i)"; sleep 2
          done
          echo "❌ Solana test validator did not become ready"; exit 1

      - name: 'Set BACKEND_WASM_PATH so the test uses the pre-built canister Wasm'
        run: |
          echo "BACKEND_WASM_PATH=$GITHUB_WORKSPACE/examples/basic_solana/target/wasm32-unknown-unknown/canister-release/backend.wasm" >> "$GITHUB_ENV"

      - name: 'Test basic_solana'
        working-directory: examples/basic_solana/
        run: |
          # The canister (wasm) build needs the getrandom custom backend cfg. The workflow's
          # RUSTFLAGS=-Dwarnings would otherwise drop the .cargo/config.toml rustflags, so set
          # it inline for the wasm build only — the host `cargo test` must NOT get this cfg
          # (host getrandom needs a real backend).
          RUSTFLAGS='-Dwarnings --cfg getrandom_backend="custom"' cargo build --target wasm32-unknown-unknown --profile canister-release -p backend
          cargo test --locked --package backend

  end-to-end-tests:
    needs: [ reproducible-build ]
    runs-on: ubuntu-22.04
    concurrency:
      group: ci_environment
    env:
      sol_rpc_canister_id: zaylz-mqaaa-aaaar-qaqzq-cai
      wallet_canister_id: zo2gr-xaaaa-aaaar-qaqyq-cai
      # Needed to surpass dfx error to use the insecure plaintext identity
      DFX_WARNING: -mainnet_plaintext_identity
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 'Download artifacts'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sol_rpc_canister.wasm.gz

      - name: 'Install dfx'
        uses: dfinity/setup-dfx@e50c04f104ee4285ec010f10609483cf41e4d365
        with:
          dfx-version: "0.27.0"

      - name: 'Confirm dfx successful installation'
        run: dfx --version

      - name: "Import dfx deploy key"
        env:
          DFX_DEPLOY_KEY: ${{ secrets.DFX_DEPLOY_KEY }}
        run: |
          key_pem=$(mktemp)
          printenv "DFX_DEPLOY_KEY" > "$key_pem"
          dfx identity import --storage-mode plaintext ci "$key_pem"
          rm "$key_pem"
          dfx identity use ci
          dfx identity get-principal
          dfx identity set-wallet --ic --force "${{ env.wallet_canister_id }}"
          dfx wallet balance --ic

      - name: "Deploy SOL RPC Canister"
        run: |
          wallet="${{ env.wallet_canister_id }}"
          dfx canister --network ic --wallet "$wallet" install --mode upgrade \
          --wasm "$GITHUB_WORKSPACE/sol_rpc_canister.wasm.gz" \
          "${{ env.sol_rpc_canister_id }}"          

      - name: "Run examples"
        working-directory: canister/ci
        run: ../scripts/examples.sh 2>&1 | tee e2e_examples.log

      - name: "Detect inconsistent results"
        working-directory: canister/ci
        run: cat e2e_examples.log | grep -q -e Inconsistent && exit 1 || exit 0

      - name: "Run end-to-end tests"
        env:
          DFX_DEPLOY_KEY: ${{ secrets.DFX_DEPLOY_KEY }}
        run: cargo test --locked --package sol_rpc_e2e_tests -- --test-threads 1 --nocapture

  # Single aggregator status check. Configure GitHub branch protection
  # to require `checks-pass` so that any failing or skipped upstream
  # job blocks the merge, without having to enumerate every individual
  # job in the ruleset.
  checks-pass:
    # Always run this job!
    if: always()
    needs:
      [
        lint,
        check-cargo-lock,
        cargo-doc,
        reproducible-build,
        unit-tests,
        basic-solana-deployment,
        basic-solana-integration-tests,
        check-canister-wasm-endpoints,
        integration-tests,
        end-to-end-tests,
      ]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            exit 1
          fi
